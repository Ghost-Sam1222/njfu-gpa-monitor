name: Check NJFU Grades

on:
  schedule:
    # Only the preset selected by CHECK_INTERVAL_HOURS starts a runner.
    - cron: "17 */2 * * *"
    - cron: "23 */3 * * *"
    - cron: "31 */6 * * *"
    - cron: "37 */12 * * *"
    - cron: "43 2 * * *"
  workflow_dispatch:
    inputs:
      reset_state:
        description: Reset this semester baseline before checking
        required: false
        default: false
        type: boolean

concurrency:
  group: njfu-grade-check-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  actions: write
  contents: read

jobs:
  check:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (vars.CHECK_INTERVAL_HOURS == '2' && github.event.schedule == '17 */2 * * *') ||
      (vars.CHECK_INTERVAL_HOURS == '3' && github.event.schedule == '23 */3 * * *') ||
      ((vars.CHECK_INTERVAL_HOURS == '6' || vars.CHECK_INTERVAL_HOURS == '') && github.event.schedule == '31 */6 * * *') ||
      (vars.CHECK_INTERVAL_HOURS == '12' && github.event.schedule == '37 */12 * * *') ||
      (vars.CHECK_INTERVAL_HOURS == '24' && github.event.schedule == '43 2 * * *')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Restore grade state
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: data/grade_state.json
          key: grade-state-v2-${{ vars.JW_SEMESTER || 'auto' }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            grade-state-v2-${{ vars.JW_SEMESTER || 'auto' }}-

      - name: Reset grade state
        if: github.event_name == 'workflow_dispatch' && inputs.reset_state
        env:
          RESET_SEMESTER: ${{ vars.JW_SEMESTER || 'auto' }}
        run: |
          mkdir -p data
          printf '{"schema_version":2,"semester":"%s","initialized":false,"observed_hashes":[],"delivered_by_channel":{},"email_pending_count":0,"complete":false}\n' "$RESET_SEMESTER" > data/grade_state.json

      - name: Preflight
        id: preflight
        env:
          MONITOR_ENABLED: ${{ vars.MONITOR_ENABLED || 'false' }}
          JW_SEMESTER: ${{ vars.JW_SEMESTER }}
          MONITOR_UNTIL: ${{ vars.MONITOR_UNTIL }}
          CHECK_START_DATE: ${{ vars.CHECK_START_DATE }}
        run: |
          if [ -z "$JW_SEMESTER" ]; then
            echo "::error::JW_SEMESTER is required"
            exit 1
          fi
          if [ "$MONITOR_ENABLED" != "true" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          today="$(TZ=Asia/Shanghai date +%F)"
          if [ -n "$CHECK_START_DATE" ] && [ "$today" \< "$CHECK_START_DATE" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -n "$MONITOR_UNTIL" ] && [ "$today" \> "$MONITOR_UNTIL" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -f data/grade_state.json ] && grep -q '"complete": true' data/grade_state.json; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "should_run=true" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.preflight.outputs.should_run == 'true'
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.preflight.outputs.should_run == 'true'
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Check grades
        if: steps.preflight.outputs.should_run == 'true'
        env:
          JW_BASE_URL: ${{ vars.JW_BASE_URL || 'https://jwxt.njfu.edu.cn' }}
          JW_USERNAME: ${{ secrets.JW_USERNAME }}
          JW_PASSWORD: ${{ secrets.JW_PASSWORD }}
          JW_COOKIE: ${{ secrets.JW_COOKIE }}
          JW_SEMESTER: ${{ vars.JW_SEMESTER }}
          BARK_SERVER: ${{ secrets.BARK_SERVER || 'https://api.day.app' }}
          BARK_DEVICE_KEY: ${{ secrets.BARK_DEVICE_KEY }}
          BARK_GROUP: ${{ vars.BARK_GROUP || 'NJFU-GPA' }}
          BARK_SOUND: ${{ vars.BARK_SOUND || 'telegraph' }}
          BARK_ICON: ${{ vars.BARK_ICON }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
          WEWORK_WEBHOOK_URL: ${{ secrets.WEWORK_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NTFY_SERVER_URL: ${{ secrets.NTFY_SERVER_URL || 'https://ntfy.sh' }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GENERIC_WEBHOOK_URL: ${{ secrets.GENERIC_WEBHOOK_URL }}
          GENERIC_WEBHOOK_TEMPLATE: ${{ secrets.GENERIC_WEBHOOK_TEMPLATE }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_SMTP_SERVER: ${{ secrets.EMAIL_SMTP_SERVER }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          MONITOR_ENABLED: ${{ vars.MONITOR_ENABLED || 'false' }}
          MONITOR_UNTIL: ${{ vars.MONITOR_UNTIL }}
          CHECK_START_DATE: ${{ vars.CHECK_START_DATE }}
          EXPECTED_COURSE_NAMES: ${{ vars.EXPECTED_COURSE_NAMES }}
          EXPECTED_GRADE_COUNT: ${{ vars.EXPECTED_GRADE_COUNT || vars.EXPECTED_NEW_COUNT || '0' }}
          NOTIFY_ON_FIRST_RUN: ${{ vars.NOTIFY_ON_FIRST_RUN || 'false' }}
          EMAIL_BATCH_SIZE: ${{ vars.EMAIL_BATCH_SIZE || '3' }}
          FINAL_REPORT_ENABLED: ${{ vars.FINAL_REPORT_ENABLED || 'true' }}
          GRADE_STATE_SALT: ${{ secrets.GRADE_STATE_SALT }}
        run: python scripts/check_grades.py

      - name: Save grade state
        if: always() && steps.preflight.outputs.should_run == 'true' && hashFiles('data/grade_state.json') != ''
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: data/grade_state.json
          key: grade-state-v2-${{ vars.JW_SEMESTER || 'auto' }}-${{ github.run_id }}-${{ github.run_attempt }}
