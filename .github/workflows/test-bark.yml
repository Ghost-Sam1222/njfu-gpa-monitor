name: Test Bark Notification

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-bark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Send test notification
        env:
          BARK_SERVER: ${{ secrets.BARK_SERVER || 'https://api.day.app' }}
          BARK_DEVICE_KEY: ${{ secrets.BARK_DEVICE_KEY }}
          BARK_GROUP: ${{ vars.BARK_GROUP || 'NJFU-GPA' }}
          BARK_SOUND: ${{ vars.BARK_SOUND || 'telegraph' }}
          BARK_ICON: ${{ vars.BARK_ICON }}
          BARK_TEST_TITLE: NJFU GPA 测试通知
          BARK_TEST_BODY: Bark 推送链路正常，后续出分会发送到这个分组。
        run: python scripts/send_test_bark.py
