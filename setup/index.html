<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>NJFU GPA 设置</title>
  <style>
    :root{color-scheme:light dark;--bg:#f5f5f7;--surface:#fff;--text:#1d1d1f;--muted:#6e6e73;--line:#d2d2d7;--blue:#0071e3;--green:#16883e;--red:#c9342f}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:15px/1.5 -apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC",sans-serif;letter-spacing:0}main{width:min(920px,100%);margin:auto;padding:30px 20px 70px}header{display:flex;align-items:center;justify-content:space-between;gap:20px;padding-bottom:22px;border-bottom:1px solid var(--line)}h1{margin:0;font-size:28px}.status{font-size:13px;color:var(--muted)}section{padding:28px 0;border-bottom:1px solid var(--line)}h2{margin:0 0 18px;font-size:19px}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}.wide{grid-column:1/-1}label{display:block;color:var(--muted);font-size:12px;font-weight:700}input,select,textarea{display:block;width:100%;margin-top:6px;padding:11px 12px;border:1px solid var(--line);border-radius:6px;background:var(--surface);color:var(--text);font:inherit}textarea{min-height:82px;resize:vertical}.segments{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;margin-top:6px;padding:2px;border:1px solid var(--line);border-radius:7px;background:var(--line)}.segments label{position:relative;text-align:center;padding:8px 4px;background:var(--surface);color:var(--text);cursor:pointer}.segments label:first-child{border-radius:4px 0 0 4px}.segments label:last-child{border-radius:0 4px 4px 0}.segments input{position:absolute;opacity:0}.segments label:has(input:checked){background:var(--blue);color:#fff}.toggle{display:flex;align-items:center;gap:9px;color:var(--text);font-size:14px}.toggle input{width:auto;margin:0}details{border-top:1px solid var(--line)}details:first-of-type{border-top:0}summary{padding:14px 0;font-weight:700;cursor:pointer}.actions{position:sticky;bottom:0;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:15px 0;background:color-mix(in srgb,var(--bg) 92%,transparent);backdrop-filter:blur(12px)}.button-row{display:flex;gap:8px}button{border:0;border-radius:6px;padding:11px 18px;background:var(--blue);color:#fff;font:700 14px inherit;cursor:pointer}button.secondary{background:var(--surface);color:var(--text);border:1px solid var(--line)}button:disabled{opacity:.5;cursor:wait}.message{min-width:0;color:var(--muted);font-size:13px}.message.ok{color:var(--green)}.message.error{color:var(--red)}.note{margin:0;color:var(--muted);font-size:13px}.secret{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
    @media(max-width:650px){main{padding:20px 14px 60px}header{align-items:flex-start;flex-direction:column}.grid{grid-template-columns:1fr}.wide{grid-column:auto}.segments{grid-template-columns:repeat(3,1fr)}.actions{position:static;align-items:flex-start;flex-direction:column}.button-row{width:100%;flex-direction:column}button{width:100%;white-space:nowrap}}
    @media(prefers-color-scheme:dark){:root{--bg:#000;--surface:#1c1c1e;--text:#f5f5f7;--muted:#aeaeb2;--line:#38383a;--blue:#2997ff;--green:#46c466;--red:#ff6961}}
  </style>
</head>
<body>
<main>
  <header><div><h1>NJFU GPA 设置</h1><p class="note">__SETUP_CONTEXT__</p></div><div id="gh-status" class="status">正在连接 GitHub…</div></header>
  <form id="setup-form">
    <section><h2>1. 教务账号</h2><div class="grid">
      <label class="wide">你的监控仓库（自动创建）<input name="repository" required placeholder="owner/njfu-gpa-monitor"></label>
      <label>学号<input class="secret" name="JW_USERNAME" autocomplete="username"></label>
      <label>密码<input class="secret" name="JW_PASSWORD" type="password" autocomplete="current-password"></label>
      <label>学期<input name="JW_SEMESTER" required placeholder="2026-2027-1"></label>
      <label>预期成绩数量<input name="EXPECTED_GRADE_COUNT" type="number" min="0" value="0"></label>
      <label class="wide">预期课程名称（可选，逗号分隔）<textarea name="EXPECTED_COURSE_NAMES"></textarea></label>
      <details class="wide"><summary>使用 Cookie 登录（高级）</summary><label>Cookie 会过期，通常无需填写<textarea class="secret" name="JW_COOKIE" autocomplete="off"></textarea></label></details>
    </div></section>
    <section><h2>2. 检查频率</h2><div class="segments">
      <label><input type="radio" name="CHECK_INTERVAL_HOURS" value="2">2 小时</label><label><input type="radio" name="CHECK_INTERVAL_HOURS" value="3">3 小时</label><label><input type="radio" name="CHECK_INTERVAL_HOURS" value="6" checked>6 小时</label><label><input type="radio" name="CHECK_INTERVAL_HOURS" value="12">12 小时</label><label><input type="radio" name="CHECK_INTERVAL_HOURS" value="24">每天</label>
    </div><div class="grid" style="margin-top:16px"><label>开始日期<input name="CHECK_START_DATE" type="date"></label><label>停止日期<input name="MONITOR_UNTIL" type="date"></label><label class="toggle"><input name="MONITOR_ENABLED" type="checkbox" checked>启用定时监控</label><label class="toggle"><input name="FINAL_REPORT_ENABLED" type="checkbox" checked>成绩齐全时发送最终成绩单</label></div></section>
    <section><h2>3. 通知渠道</h2>
      <details open><summary>Bark</summary><div class="grid"><label>Device Key<input class="secret" name="BARK_DEVICE_KEY" type="password"></label><label>服务器<input class="secret" name="BARK_SERVER" value="https://api.day.app"></label><label>分组<input name="BARK_GROUP" value="NJFU-GPA"></label><label>提示音<input name="BARK_SOUND" value="telegraph"></label><label class="wide">图标 URL<input name="BARK_ICON"></label></div></details>
      <details><summary>飞书、钉钉、企业微信与 Slack</summary><div class="grid"><label>飞书 Webhook<input class="secret" name="FEISHU_WEBHOOK_URL" type="password"></label><label>钉钉 Webhook<input class="secret" name="DINGTALK_WEBHOOK_URL" type="password"></label><label>企业微信 Webhook<input class="secret" name="WEWORK_WEBHOOK_URL" type="password"></label><label>Slack Webhook<input class="secret" name="SLACK_WEBHOOK_URL" type="password"></label></div></details>
      <details><summary>Telegram 与 ntfy</summary><div class="grid"><label>Telegram Bot Token<input class="secret" name="TELEGRAM_BOT_TOKEN" type="password"></label><label>Telegram Chat ID<input class="secret" name="TELEGRAM_CHAT_ID" type="password"></label><label>ntfy 服务器<input class="secret" name="NTFY_SERVER_URL" value="https://ntfy.sh"></label><label>ntfy Topic<input class="secret" name="NTFY_TOPIC" type="password"></label><label>ntfy Token<input class="secret" name="NTFY_TOKEN" type="password"></label></div></details>
      <details><summary>邮件</summary><div class="grid"><label>发件邮箱<input class="secret" name="EMAIL_FROM" type="email"></label><label>授权码<input class="secret" name="EMAIL_PASSWORD" type="password"></label><label>收件邮箱<input class="secret" name="EMAIL_TO"></label><label>满几项发送<input name="EMAIL_BATCH_SIZE" type="number" min="1" value="3"></label><label>SMTP 服务器（可选）<input class="secret" name="EMAIL_SMTP_SERVER"></label><label>SMTP 端口（可选）<input class="secret" name="EMAIL_SMTP_PORT" type="number"></label></div></details>
      <details><summary>通用 Webhook</summary><div class="grid"><label class="wide">Webhook URL<input class="secret" name="GENERIC_WEBHOOK_URL" type="password"></label><label class="wide">JSON 模板（可选）<textarea class="secret" name="GENERIC_WEBHOOK_TEMPLATE" placeholder='{"title":"{title}","content":"{content}"}'></textarea></label></div></details>
    </section>
    <section><div class="grid"><label class="toggle"><input name="run_test" type="checkbox" checked>保存后触发一次通知测试</label><label class="toggle"><input name="NOTIFY_ON_FIRST_RUN" type="checkbox">首次建立基线也推送已有成绩</label></div></section>
    <div class="actions"><div id="message" class="message">敏感信息只会写入 GitHub Secrets，空白项不会覆盖已有值。</div><div class="button-row"><button id="verify" class="secondary" type="button">验证教务登录</button><button id="apply" type="submit">完成配置</button></div></div>
  </form>
</main>
<script>
  const csrf='__CSRF_TOKEN__'; const form=document.querySelector('#setup-form'); const message=document.querySelector('#message'); const button=document.querySelector('#apply'); const verify=document.querySelector('#verify');
  fetch('/api/status').then(r=>r.json()).then(s=>{const repository=document.querySelector('[name=repository]');repository.value=s.repository||'';repository.readOnly=Boolean(s.cloud);const semester=document.querySelector('[name=JW_SEMESTER]');if(!semester.value)semester.value=s.semester||'';document.querySelector('#gh-status').textContent=!s.gh_installed?'GitHub 组件未就绪':s.gh_authenticated?(s.cloud?'GitHub 云端已连接':'GitHub CLI 已登录'):'GitHub 需要重新登录';});
  verify.addEventListener('click',async()=>{verify.disabled=true;message.className='message';message.textContent='正在安全验证教务登录…';const data=new FormData(form);try{const response=await fetch('/api/verify-jw',{method:'POST',headers:{'Content-Type':'application/json','X-CSRF-Token':csrf},body:JSON.stringify({username:data.get('JW_USERNAME'),password:data.get('JW_PASSWORD'),cookie:data.get('JW_COOKIE'),semester:data.get('JW_SEMESTER')})});const result=await response.json();if(!response.ok||!result.ok)throw new Error(result.error||'验证失败');message.className='message ok';message.textContent='教务登录和本学期成绩查询均已验证。';}catch(error){message.className='message error';message.textContent=error.message;}finally{verify.disabled=false;}});
  form.addEventListener('submit',async event=>{event.preventDefault();button.disabled=true;message.className='message';message.textContent='正在写入配置，请勿关闭本页…';const data=new FormData(form);const secretNames=['JW_USERNAME','JW_PASSWORD','JW_COOKIE','BARK_SERVER','BARK_DEVICE_KEY','FEISHU_WEBHOOK_URL','DINGTALK_WEBHOOK_URL','WEWORK_WEBHOOK_URL','TELEGRAM_BOT_TOKEN','TELEGRAM_CHAT_ID','NTFY_SERVER_URL','NTFY_TOPIC','NTFY_TOKEN','SLACK_WEBHOOK_URL','GENERIC_WEBHOOK_URL','GENERIC_WEBHOOK_TEMPLATE','EMAIL_FROM','EMAIL_PASSWORD','EMAIL_TO','EMAIL_SMTP_SERVER','EMAIL_SMTP_PORT'];const variableNames=['JW_SEMESTER','CHECK_INTERVAL_HOURS','CHECK_START_DATE','MONITOR_UNTIL','EXPECTED_COURSE_NAMES','EXPECTED_GRADE_COUNT','EMAIL_BATCH_SIZE','BARK_GROUP','BARK_SOUND','BARK_ICON'];const secrets={},variables={};secretNames.forEach(name=>secrets[name]=data.get(name)||'');variableNames.forEach(name=>variables[name]=data.get(name)||'');['MONITOR_ENABLED','FINAL_REPORT_ENABLED','NOTIFY_ON_FIRST_RUN'].forEach(name=>variables[name]=data.has(name)?'true':'false');try{const response=await fetch('/api/apply',{method:'POST',headers:{'Content-Type':'application/json','X-CSRF-Token':csrf},body:JSON.stringify({repository:data.get('repository'),secrets,variables,run_test:data.has('run_test')})});const result=await response.json();if(!response.ok||!result.ok)throw new Error(result.error||'配置失败');message.className='message ok';message.textContent=`配置完成${result.test_started?'，通知测试已启动':''}。`;button.textContent='配置完成';form.querySelectorAll('input[type=password],textarea.secret').forEach(field=>field.value='');}catch(error){message.className='message error';message.textContent=error.message;}finally{button.disabled=false;}});
</script>
</body>
</html>
