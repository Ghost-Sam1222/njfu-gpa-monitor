<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>NJFU GPA Monitor</title>
  <style>
    :root{color-scheme:light dark;--bg:#f5f5f7;--surface:#fff;--text:#1d1d1f;--muted:#6e6e73;--line:#d2d2d7;--blue:#0071e3;--green:#167845}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:15px/1.55 -apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC",sans-serif;letter-spacing:0}main{width:min(980px,100%);min-height:100vh;margin:auto;padding:52px 24px 44px}.masthead{display:grid;grid-template-columns:minmax(0,1fr) 220px;align-items:center;gap:52px;padding-bottom:42px;border-bottom:1px solid var(--line)}.art{width:220px;aspect-ratio:1;object-fit:cover;border-radius:8px}h1{margin:0;font-size:48px;line-height:1.08}h1 span{display:block;margin-bottom:10px;color:var(--green);font-size:14px;line-height:1.4}p{margin:16px 0 0;color:var(--muted);font-size:17px}.launch{margin-top:26px}.launch label{display:block;color:var(--muted);font-size:12px;font-weight:700}.launch input{width:100%;margin-top:6px;padding:12px;border:1px solid var(--line);border-radius:7px;background:var(--surface);color:var(--text);font:inherit}.button-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.button{display:flex;align-items:center;justify-content:center;min-height:48px;padding:12px 16px;border:1px solid var(--blue);border-radius:7px;background:var(--blue);color:#fff;text-decoration:none;font:750 14px inherit;cursor:pointer}.button.secondary{background:var(--surface);color:var(--blue)}.facts{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:0;margin-top:32px;border:1px solid var(--line);border-radius:8px;background:var(--surface)}.fact{padding:22px}.fact+.fact{border-left:1px solid var(--line)}.fact strong{display:block;font-size:15px}.fact span{display:block;margin-top:5px;color:var(--muted);font-size:13px}footer{display:flex;justify-content:space-between;gap:20px;margin-top:26px;color:var(--muted);font-size:12px}footer a{color:inherit}
    @media(max-width:700px){main{padding:30px 18px}.masthead{grid-template-columns:1fr;gap:28px;padding-bottom:34px}.art{order:-1;width:118px}h1{font-size:36px}.button-row{grid-template-columns:1fr}.facts{grid-template-columns:1fr}.fact+.fact{border-left:0;border-top:1px solid var(--line)}footer{flex-direction:column}}
    @media(prefers-color-scheme:dark){:root{--bg:#000;--surface:#1c1c1e;--text:#f5f5f7;--muted:#aeaeb2;--line:#38383a;--blue:#2997ff;--green:#52c788}}
  </style>
</head>
<body>
<main>
  <section class="masthead">
    <div>
      <h1><span>南京林业大学成绩监控</span>NJFU GPA Monitor</h1>
      <p>登录教务系统、选择检查频率和通知方式。配置直接保存在你的 GitHub 仓库，无需下载代码或使用终端。</p>
      <form class="launch" id="launch-form">
        <label>你的 GitHub 用户名<input id="github-user" required autocomplete="username" pattern="[A-Za-z0-9-]+" placeholder="例如 Ghost-Sam1222"></label>
        <div class="button-row">
          <a class="button secondary" id="create-repository" href="https://github.com/new?template_name=njfu-gpa-monitor&amp;template_owner=Ghost-Sam1222&amp;name=njfu-gpa-monitor" target="_blank" rel="noopener">1. 创建监控仓库</a>
          <button class="button" type="submit">2. 打开云端设置</button>
        </div>
      </form>
    </div>
    <img class="art" src="assets/njfu-gpa-icon.png" alt="NJFU GPA Monitor 图标">
  </section>
  <section class="facts" aria-label="隐私与运行方式">
    <div class="fact"><strong>仅本人可访问</strong><span>设置页使用 GitHub Codespaces 私有端口。</span></div>
    <div class="fact"><strong>敏感信息不进仓库</strong><span>账号、密码和推送密钥写入 GitHub Secrets。</span></div>
    <div class="fact"><strong>自动运行</strong><span>配置完成后由 GitHub Actions 按选定频率检查。</span></div>
  </section>
  <footer><span>首次启动云环境通常需要 2 至 4 分钟。</span><span><a href="channels.html">通知渠道怎么选</a> · <a id="source-repository" href="https://github.com/Ghost-Sam1222/njfu-gpa-monitor">源代码与隐私边界</a></span></footer>
</main>
<script>
  const onGitHubPages=location.hostname.toLowerCase().endsWith('.github.io');
  const pagesOwner=onGitHubPages?location.hostname.split('.')[0]:'';
  const pagesRepository=onGitHubPages?location.pathname.split('/').filter(Boolean)[0]:'';
  const source=pagesOwner&&pagesRepository?`${pagesOwner}/${pagesRepository}`:'Ghost-Sam1222/njfu-gpa-monitor';
  const [sourceOwner,repositoryName]=source.split('/');
  document.querySelector('#create-repository').href=`https://github.com/new?template_name=${encodeURIComponent(repositoryName)}&template_owner=${encodeURIComponent(sourceOwner)}&name=${encodeURIComponent(repositoryName)}`;
  document.querySelector('#source-repository').href=`https://github.com/${source}`;
  document.querySelector('#launch-form').addEventListener('submit',event=>{
    event.preventDefault();
    const user=document.querySelector('#github-user').value.trim();
    if(!/^[A-Za-z0-9-]+$/.test(user))return;
    location.href=`https://codespaces.new/${encodeURIComponent(user)}/${encodeURIComponent(repositoryName)}?quickstart=1`;
  });
</script>
</body>
</html>
